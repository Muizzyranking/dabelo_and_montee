{% extends "accounts/base.html" %}
{% block title %}Change Password{% endblock %}
{% block account_content %}

<div class="acc-page-title">Change Password</div>
<p class="acc-page-sub">Choose a strong password of at least 8 characters.</p>

<form method="post" action="{% url 'account_password' %}">
  {% csrf_token %}
  <div class="acc-card" style="max-width: 480px">
    <div class="acc-card-title">Update Password</div>
    <div class="acc-field">
      <label class="acc-label" for="current_password">Current Password</label>
      <input type="password" id="current_password" name="current_password"
             class="acc-input" placeholder="Enter your current password"/>
    </div>
    <div class="acc-field">
      <label class="acc-label" for="new_password">New Password</label>
      <input type="password" id="new_password" name="new_password"
             class="acc-input" placeholder="At least 8 characters"/>
    </div>
    <div class="acc-field">
      <label class="acc-label" for="confirm_password">Confirm New Password</label>
      <input type="password" id="confirm_password" name="confirm_password"
             class="acc-input" placeholder="Repeat your new password"/>
    </div>
  </div>
  <button type="submit" class="acc-submit">Update Password</button>
</form>
{% endblock %}
