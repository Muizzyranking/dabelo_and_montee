{% load static %}
<!DOCTYPE html>
<html lang="en" class="{% block html_class %}{% endblock %}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
          content="{% block meta_description %}Dabelo Café & Motee Cakes — Fresh juices and handcrafted cakes delivered to you.{% endblock %}" />
    <title>
      {% block title %}Dabelo Café & Motee Cakes{% endblock %}
    </title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}" />
    <link rel="icon"
          href="{% block favicon %}{% static 'images/favicon.ico' %}{% endblock %}"
          type="image/x-icon" />
    {% block extra_head %}{% endblock %}
  </head>
  <body class="{% block body_class %}{% endblock %}">
    {% block navbar %} {% include "base/navbar.html" %} {% endblock %}
    <main>
      {% block content %}{% endblock %}
    </main>
    {% block footer %}{% endblock %}
    <script src="{% static 'js/script.js' %}"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
