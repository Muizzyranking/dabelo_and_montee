<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — Dabelo & Motee</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0F0F0F;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      overflow: hidden;
      position: relative;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 28px,
        rgba(255,255,255,0.015) 28px,
        rgba(255,255,255,0.015) 29px
      );
      pointer-events: none;
    }

    /* Glows */
    .glow-green {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15,77,47,0.25) 0%, transparent 70%);
      top: -100px; left: -100px;
      pointer-events: none;
    }
    .glow-purple {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(86,55,114,0.2) 0%, transparent 70%);
      bottom: -80px; right: -80px;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 560px;
      width: 100%;
    }

    /* Big 404 */
    .error-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 300;
      line-height: 0.85;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #C59A3D 0%, #E8E0D0 50%, #C59A3D 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      user-select: none;
    }

    .kicker {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #6B6560;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .kicker::before, .kicker::after {
      content: '';
      width: 32px; height: 1px;
      background: #6B6560;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 600;
      color: #E8E0D0;
      line-height: 1.1;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    h1 em {
      font-style: italic;
      color: #C59A3D;
    }

    p {
      font-size: 15px;
      color: #6B6560;
      line-height: 1.7;
      margin-bottom: 36px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: #0F4D2F;
      color: #fff;
      text-decoration: none;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-radius: 3px;
      transition: all 0.2s;
    }
    .btn-primary:hover {
      background: #1E7248;
      transform: translateY(-1px);
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: transparent;
      border: 1px solid #2A2A2A;
      color: #6B6560;
      text-decoration: none;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-radius: 3px;
      transition: all 0.2s;
    }
    .btn-ghost:hover {
      border-color: #E8E0D0;
      color: #E8E0D0;
    }

    /* Quick links */
    .quick-links {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .quick-link {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6B6560;
      text-decoration: none;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .quick-link:hover { color: #C59A3D; }

    /* Brand watermark */
    .watermark {
      position: fixed;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(80px, 18vw, 160px);
      font-weight: 600;
      letter-spacing: -0.03em;
      color: rgba(255,255,255,0.015);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>

  <div class="glow-green"></div>
  <div class="glow-purple"></div>
  <div class="watermark">Dabelo × Motee</div>

  <div class="card">

    <div class="error-number">404</div>

    <div class="kicker">Page Not Found</div>

    <h1>We looked <em>everywhere.</em><br/>It's not here.</h1>

    <p>
      The page you're looking for may have been moved, deleted,
      or never existed in the first place. Let's get you back on track.
    </p>

    <div class="actions">
      <a href="/" class="btn-primary">← Back to Home</a>
      <a href="/shop/" class="btn-ghost">Browse the Shop</a>
    </div>

    <div class="quick-links">
      <a href="/shop/dabelo/" class="quick-link">🌿 Dabelo Café</a>
      <a href="/shop/montee/" class="quick-link">🎂 Motee Cakes</a>
      <a href="/custom-order/" class="quick-link">✉️ Custom Order</a>
      <a href="/account/" class="quick-link">👤 My Account</a>
    </div>

  </div>

</body>
</html>
